<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUNK'S | Street Luxury Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        @keyframes infinite-scroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        .animate-infinite-scroll { animation: infinite-scroll 30s linear infinite; }
        
        /* Shutter Animation Styles */
        #shutter-container {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }
        .shutter-half {
            flex: 1;
            background: black;
            transition: transform 1.2s cubic-bezier(0.87, 0, 0.13, 1);
            pointer-events: all;
        }
        .shutter-open-top { transform: translateY(-100%); }
        .shutter-open-bottom { transform: translateY(100%); }
        
        #loader-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body class="bg-white text-black antialiased">

    <div id="shutter-container">
        <div id="loader-logo" class="text-white text-center">
            <h1 class="text-4xl font-black tracking-tighter mb-2">DUNK'S</h1>
            <p class="text-[8px] tracking-[0.4em] uppercase opacity-50">Studio Loading</p>
        </div>
        <div class="shutter-half" id="shutter-top"></div>
        <div class="shutter-half" id="shutter-bottom"></div>
    </div>

    <div class="bg-black text-white py-2 px-4 text-[10px] tracking-[0.3em] font-bold text-center uppercase">
        Free Worldwide Shipping on Orders Above ₹5000
    </div>

    <nav id="navbar" class="sticky top-0 z-50 bg-white transition-all duration-300 px-6 py-4 lg:px-12 flex justify-between items-center border-b border-gray-100">
        <div class="hidden lg:flex items-center space-x-8 text-[11px] font-bold tracking-widest">
            <a href="#" class="hover:opacity-50">SHOP</a>
            <a href="#" class="hover:opacity-50">COLLECTIONS</a>
        </div>
        <div class="h-8 lg:h-10">
            <svg viewBox="0 0 350 100" class="h-full w-auto">
                <text x="10" y="75" style="font-family: Arial Black; font-size: 70px; font-weight: 900; fill: white; stroke: black; stroke-width: 2.5px; letter-spacing: -2px;">DUNKS</text>
            </svg>
        </div>
        <div class="flex items-center space-x-6">
            <div class="relative cursor-pointer" id="cartBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[8px] w-4 h-4 flex items-center justify-center rounded-full font-bold">0</span>
            </div>
        </div>
    </nav>

    <section class="relative h-[80vh] bg-gray-200 flex items-center justify-center">
        <img src="https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?q=80&w=2000" class="absolute inset-0 w-full h-full object-cover grayscale opacity-80" />
        <div class="relative z-10 text-center text-white mix-blend-difference">
            <h1 class="text-7xl md:text-[10rem] font-black tracking-tighter leading-none">STREET<br>LUXURY</h1>
        </div>
    </section>

    <section class="p-12 lg:px-24">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8" id="product-grid">
            <div class="group cursor-pointer" onclick="addToCart('p1', 'ARCHIVE TEE', 2499)">
                <div class="aspect-[3/4] bg-gray-100 mb-4 overflow-hidden relative">
                    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        <span class="bg-white text-black px-4 py-2 text-[10px] font-bold">ADD TO CART</span>
                    </div>
                </div>
                <div class="flex justify-between font-bold text-xs">
                    <span>ARCHIVE TEE</span>
                    <span>₹2,499</span>
                </div>
            </div>
            </div>
    </section>

    <script>
        // 1. YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAZPYLEuSJJcQukGCMvp7QtZOs2NJMOTKQ",
            authDomain: "dunk-s-official.firebaseapp.com",
            projectId: "dunk-s-official",
            storageBucket: "dunk-s-official.firebasestorage.app",
            messagingSenderId: "85618157832",
            appId: "1:85618157832:web:f649f2ea4099db5e81a4bd",
            measurementId: "G-2HMMR9KY5R"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        firebase.analytics();

        // 2. Shutter Logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader-logo').style.opacity = '0';
                document.getElementById('shutter-top').classList.add('shutter-open-top');
                document.getElementById('shutter-bottom').classList.add('shutter-open-bottom');
                setTimeout(() => {
                    document.getElementById('shutter-container').style.display = 'none';
                }, 1200);
            }, 1500);
        });

        // 3. Simple Cart Logic
        let cartCount = 0;
        function addToCart(id, name, price) {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
            
            // Save to Firebase (Anonymous)
            auth.signInAnonymously().then(({user}) => {
                db.collection("carts").doc(user.uid).collection("items").add({
                    productId: id,
                    name: name,
                    price: price,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
            alert(`${name} added to studio bag.`);
        }
    </script>
</body>
</html>
